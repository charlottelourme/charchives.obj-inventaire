services:
  - type: web
    name: charchives
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # ── Base de données ──────────────────────────────────────────────────────
      # Colle ici la connection string MongoDB Atlas (mongodb+srv://...)
      - key: MONGODB_URI
        sync: false
      # ── Cloudinary ───────────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # ── IA ───────────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      # ── CORS : domaine Render auto-assigné (laisser vide = accepte tout) ────
      # Exemple : CORS_ORIGIN=https://charchives.onrender.com
      - key: CORS_ORIGIN
        sync: false
